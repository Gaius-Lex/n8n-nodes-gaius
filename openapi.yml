      description: >-
        ## SIP Search API


        This endpoint allows users to perform a search in Gaius-Lex database
        based on specified query parameters.


        ### Request


        - **Method**: `GET`
            
        - **Endpoint**: `{{baseUrl}}/api/v1/search`
            

        ### Query Parameters


        - `q` (string): The search query string.
            
        - `page` (integer): The page number for pagination (default is 1).
            
        - `page_size` (integer): The number of results per page (default is 10).
            
        - `sort_by` (string): The criteria to sort the results (e.g., by score).
            
        - `date_from` (string): The starting date for filtering results (format:
        YYYY-MM-DD).
            
        - `date_to` (string): The ending date for filtering results (format:
        YYYY-MM-DD).
            
        - `categories` (string): Categories to filter the search results. This
        parameter can be repeated to include multiple categories. To retrieve
        possible categories use
            
        - `language` (string): The language code for the search results (e.g.,
        'pl' for Polish)
            

        ### Response


        The response will be in JSON format, indicating the success or failure
        of the search operation. An example response is:


