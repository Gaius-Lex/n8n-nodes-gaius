                {
                    "url": "/show-document?gLexID=aa0c0630",
                    "headline": "Rezolucja w sprawie programu prac Komisji Europejskiej na 2015 r.",
                    "highlight": "28.4.2015 PL Dziennik Urzędowy Unii Europejskiej C 140/1 (2015/C 140/01) EUROPEJSKI KOMITET REGIONÓW Uwzględniając komunikat Komisji Europejskiej dotyczący jej programu <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>prac</b> na rok 2015 oraz swój protokół o współpracy z Komisją Europejską: 1. Z zadowoleniem przyjmuje pragnienie Komisji, by zbliżyć się do obywateli UE i zdobyć ich zaufanie, oraz podkreśla rolę, jaką w tym zamierzeniu mogą odegrać europejskie miasta i regiony. 2.(...) Wnosi o zaangażowanie Komitetu w <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>prace</b> grup roboczych zajmujących się upraszczaniem prawodawstwa europejskiego, gdyż w wielu przypadkach to władze lokalne i regionalne odpowiadają za jego wdrażanie. 9.(...) Z zadowoleniem przyjmuje skupienie się na MŚP i podkreśla wkład tych przedsiębiorstw we wzrost gospodarczy i tworzenie miejsc <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>pracy</b> na szczeblu lokalnym i regionalnym UE. Zaznacza swoją gotowość do współpracy przy tworzeniu sieci przedstawicieli MŚP na poziomie regionów. Oczekuje, że nowe wnioski dotyczące unii rynków kapitałowych przyczynią się do poprawy dostępu MŚP do finansowania. 32.",
