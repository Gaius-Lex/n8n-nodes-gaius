                    "highlight": "EKES docenia również dostosowany program <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>prac</b> na rok 2020, który stanowi reakcję na kryzys COVID-19 i może zapowiadać rozwój sytuacji w najbliższej przyszłości. 1.4. EKES z zadowoleniem przyjmuje fakt, że Komisja Europejska dostosowała swój program <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>prac</b> na rok 2020 jako część europejskiego planu naprawy gospodarczej w odpowiedzi na pandemię koronawirusa.(...) Przesunięcie w kierunku działań opartych na usługach doprowadziłoby do bardziej pracochłonnej gospodarki, równoważącej niepewność zatrudnienia w tych sektorach, wspierającej wyższe poziomy zatrudnienia i przywracającej miejsca <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>pracy</b> w gospodarce realnej. Niezbędna jest zatem polityka promująca <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>pracę</b> wysokiej jakości w sektorach pracochłonnych zapewniających wysokiej jakości usługi. 6.1.9.(...) Potrzebne są również dobrze funkcjonujące rynki <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>pracy</b>, publiczne służby zatrudnienia oraz aktywna polityka rynku <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>pracy</b> ( 17 ) . 6.1.10. EKES popiera strategię Komisji na rzecz równouprawnienia płci na lata 2020-2025 i zaleca, by Komisja stosowała strategie uwzględniania aspektu płci we wszystkich organach zajmujących się programowaniem i zarządzaniem oraz przyjęła przekrojowe podejście do równości płci.",
                    "source": "pl_eurlex",
                    "date": [
                        "2020-07-16T00:00:00.000Z"
                    ],
                    "extra_info": {
                        "glexID": "00b77f61"
                    },
                    "gLexID": "00b77f61"
                },
                {
                    "url": "/show-document?gLexID=35e5abc0",
                    "headline": "Rezolucja Komitetu Regionów w sprawie programu prac legislacyjnych i programu prac Komisji Europejskiej oraz priorytetów Komitetu Regionów na rok 2007",
                    "highlight": "10.3.2007 PL Dziennik Urzędowy Unii Europejskiej C 57/39 (2007/C 57/09) KOMITET REGIONÓW, uwzględniając program <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>prac</b> legislacyjnych i program <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>prac</b> Komisji na rok 2007 (COM(2006) 629 wersja ostateczna); uwzględniając strategiczne cele na lata 2005 - 2009 (COM(2005) 12 wersja ostateczna); uwzględniając rezolucję Komitetu Regionów w sprawie \"Cele polityczne Komitetu Regionów na lata 2006 - 2008\" (CdR 11/2006 final); uwzględniając komunikat Komisji zatytułowany \"Wkład Komisji w okres refleksji i plany(...) Dobrobyt 4.1 Podkreśla potrzebę stałej modernizacji gospodarki europejskiej i europejskiego modelu społecznego poprzez odnowioną strategię lizbońską na rzecz wzrostu i zatrudnienia. 4.2 Podkreśla , że wyniki <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>prac</b> platformy monitorowania procesu lizbońskiego (ustanowionej przez KR w roku 2006) wykazują, że cykl zarządzania procesem lizbońskim musi zachęcać do większego poczucia udziału w nim oraz zaangażowania na rzecz osiągania wyników na wszystkich szczeblach tego procesu, jak również do ściślejszego(...) Wzywa Komisję, by aktywnie włączyła władze lokalne i regionalne w proces wyboru dziedzin priorytetowych dla tej inicjatywy oraz oczekuje , że zostanie w pełni włączony w <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>prace</b> w zakresie tejże inicjatywy. 4.7 Z zadowoleniem przyjmuje zaproponowaną przez Komisję Europejską ocenę społeczeństwa europejskiego, jak również przegląd jednolitego rynku, do czego Komitet Regionów wniesie wkład przyjmując opinię perspektywiczną.",
                    "source": "pl_eurlex",
