openapi: 3.0.0
info:
  title: Gaius-Lex API 2.0
  version: 1.0.0
  description: |-
    Gaius-Lex OpenAPI spec for endpoints usable with an Organization API key.

    Authentication:

    - Send header `Authorization: Api-Key {{apiKey}}`
        
    - Most endpoints respond with `401` if the header is missing/invalid.
servers:
  - url: https://api.gaius-lex.pl
paths:
  /api/v1/available-sources:
    get:
      summary: /api/v1/available-sources
      parameters:
        - name: country
          in: query
          schema:
            type: string
          example: pl
        - name: Authorization
          in: header
          schema:
            type: string
          example: Api-Key {{apiKey}}
      responses:
        "200":
          description: Map of source_id -> label
          content:
            application/json:
              schema:
                type: object
                properties:
                  pl_own_database:
                    type: string
                  pl_judiciary:
                    type: string
                  pl_eureka:
                    type: string
                  pl_codexes:
                    type: string
                  pl_eurlex:
                    type: string
                  pl_acts:
                    type: string
                  kio:
                    type: string
                  pl_willami:
                    type: string
              example:
                pl_own_database: Mój dysk
                pl_judiciary: Orzecznictwo
                pl_eureka: Interpretacje podatkowe
                pl_codexes: Kodeksy
                pl_eurlex: Prawo europejskie
                pl_acts: Ustawy
                kio: KIO
                pl_willami: Web
      tags:
        - api
        - v1
        - Available Sources
      description: >-
        ## Available Sources API


        This endpoint allows users to perform a search in Gaius-Lex database
        based on specified query parameters.


        ### Request


        - **Method**: `GET`
            
        - **Endpoint**: `{{baseUrl}}/api/v1/available-sources`
            

        ### Response


        The response will be in JSON format, indicating the success or failure
        of the search operation. An example response is:


        ``` json

        {
            "pl_own_database": "Mój dysk",
            "pl_judiciary": "Orzecznictwo",
            "pl_eureka": "Interpretacje podatkowe",
            "pl_codexes": "Kodeksy",
            "pl_eurlex": "Prawo europejskie",
            "pl_acts": "Ustawy",
            "kio": "KIO",
            "pl_willami": "Web"
        }

         ```

        This indicates that the request was processed successfully.
  /api/v1/search:
    get:
      summary: /api/v1/search
      parameters:
        - name: q
          in: query
          schema:
            type: string
          example: praca
        - name: page
          in: query
          schema:
            type: integer
          example: "1"
        - name: page_size
          in: query
          schema:
            type: integer
          example: "10"
        - name: sort_by
          in: query
          schema:
            type: string
          example: score
        - name: date_from
          in: query
          schema:
            type: string
          example: "2025-01-15"
        - name: date_to
          in: query
          schema:
            type: string
        - name: categories
          in: query
          schema:
            type: string
          example: pl_judiciary
        - name: language
          in: query
          schema:
            type: string
          example: pl
        - name: Authorization
          in: header
          schema:
            type: string
          example: Api-Key {{apiKey}}
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        url:
                          type: string
                        headline:
                          type: string
                        highlight:
                          type: string
                        source:
                          type: string
                        date:
                          type: array
                          items:
                            type: string
                            format: date-time
                        extra_info:
                          type: object
                          properties:
                            glexID:
                              type: string
                        gLexID:
                          type: string
                  pagination_info:
                    type: object
                    properties:
                      page:
                        type: integer
                      page_size:
                        type: integer
                      total:
                        type: integer
                      total_pages:
                        type: integer
                  shortcut_response:
                    type: string
