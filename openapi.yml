                {
                    "url": "/show-document?gLexID=ccd02551",
                    "headline": "Rezolucja w sprawie programu prac Komisji Europejskiej na 2016 r.",
                    "highlight": "10.2.2016 PL Dziennik Urzędowy Unii Europejskiej C 51/1 (2016/C 051/01) KOMITET REGIONÓW - uwzględniając komunikat Komisji Europejskiej \"Program <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>prac</b> Komisji na 2016 r.(...) Czas na nieprzeciętne działania\" oraz umowę o współpracy między KR-em a Komisją Europejską, - uwzględniając rezolucję KR-u z 9 lipca 2015 r. w sprawie priorytetów dotyczących programu <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>prac</b> Komisji Europejskiej na 2016 r. oraz rezolucję KR-u z 4 czerwca 2015 r. w sprawie priorytetów Komitetu na szóstą kadencję w latach 2015-2020, - uwzględniając zasady pomocniczości i proporcjonalności, Miejsca <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>pracy</b>, wzrost gospodarczy, inwestycje i polityka spójności 1.(...) Wzywa Komisję do zaproponowania przeglądu dyrektywy w sprawie ochrony pracowników przed zagrożeniami związanymi z narażeniem na działanie czynników rakotwórczych lub mutagennych podczas <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>pracy</b> oraz wniosku dotyczącego dyrektywy w sprawie zaburzeń układu mięśniowo-szkieletowego związanych z wykonywaną <strong class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27; class=&#x27;preserveHtml&#x27;>pracą</b>. 36.",
